apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 9.2.4
    helm:
      releaseName: grafana
      values: |
        service:
          type: ClusterIP

        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            nginx.ingress.kubernetes.io/ssl-redirect: "true"
          hosts:
            - grafana.mos-hack.ru
          path: /
          pathType: Prefix
          tls:
            - secretName: grafana-tls
              hosts:
                - grafana.mos-hack.ru

        persistence:
          enabled: true
          storageClassName: local-path
          size: 10Gi
        
        initChownData:
          enabled: false

        adminUser: admin
        adminPassword: prom-operator

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                url: http://prometheus-server.observability.svc.cluster.local
                access: proxy
                isDefault: true
              - name: Loki
                type: loki
                url: http://loki.observability.svc.cluster.local:3100
                access: proxy

        resources:
          limits:
            memory: 512Mi
            cpu: 500m
          requests:
            memory: 256Mi
            cpu: 100m

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
