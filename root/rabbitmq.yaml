apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq
  namespace: argocd
spec:
  project: default

  source:
    repoURL: oci://registry-1.docker.io/bitnamicharts
    chart: rabbitmq
    targetRevision: 12.0.0
    helm:
      values: |
        auth:
          username: admin
          password: admin123

        persistence:
          enabled: true
          storageClass: local-path
          size: 10Gi

        service:
          type: ClusterIP

        extraPlugins: "rabbitmq_management"

  destination:
    server: https://kubernetes.default.svc
    namespace: rabbitmq

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true