apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: graduation-gateway
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: gateway=ghcr.io/dan9191/graduation-work/gateway
    argocd-image-updater.argoproj.io/gateway.update-strategy: digest
    argocd-image-updater.argoproj.io/gateway.pull-secret: ghcr-secret
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/git-username-secret: image-updater-git
spec:
  project: default
  source:
    repoURL: https://github.com/Dan9191/infra.git
    targetRevision: main
    path: apps/graduation/gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: graduation-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true