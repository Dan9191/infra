apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-updater-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Dan9191/infra.git
    targetRevision: main
    path: apps/graduation/image-updater
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true