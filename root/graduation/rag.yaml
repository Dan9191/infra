apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: graduation-rag
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Dan9191/infra.git
    targetRevision: main
    path: apps/graduation/rag
  destination:
    server: https://kubernetes.default.svc
    namespace: graduation-rag
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true