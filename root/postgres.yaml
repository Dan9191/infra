apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Dan9191/infra.git
    targetRevision: main
    path: apps/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
