apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: argocd-image-updater-overlay
  namespace: argocd
resources:
  - https://github.com/argoproj-labs/argocd-image-updater.git/config/default?ref=v1.1.0
patches:
  - target:
      kind: Deployment
      name: argocd-image-updater-controller
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args
        value:
          - --annotation-mode=true