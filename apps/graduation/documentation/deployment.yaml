apiVersion: apps/v1
kind: Deployment
metadata:
  name: documentation-dep
  namespace: graduation-documentation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graduation-documentation
  template:
    metadata:
      labels:
        app: graduation-documentation
    spec:
      containers:
        - name: graduation-documentation
          image: ghcr.io/dan9191/graduation-work/docs:73b313f7ef7ee92d0db81ed9ffa2bda084ec5f58
          ports:
            - containerPort: 80
